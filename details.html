<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-and-Go | Katalog</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4e4cfd; --secondary: #f1911e; --bg: #f8f9fc; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
        
        /* Navigatsiya */
        header { 
            background: var(--primary); color: white; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { color: white; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }

        /* Mahsulotlar Grid */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .img-box { width: 100%; height: 200px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px; font-size: 1.2rem; }
        .price-tag { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        .btn-open { width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }

        /* Modal (Yangi oyna) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; position: relative; animation: slideUp 0.4s; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }
        
        .modal-body { display: flex; gap: 20px; margin-top: 20px; }
        .modal-img { width: 250px; height: 200px; border-radius: 10px; object-fit: cover; }
        .details-info { flex: 1; }
        
        .option-group { margin: 15px 0; }
        select, input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; }
        .total-price { font-size: 1.5rem; color: var(--secondary); font-weight: bold; margin: 20px 0; display: block; }
        .btn-confirm { width: 100%; padding: 15px; border: none; border-radius: 10px; background: var(--secondary); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Orqaga</a>
        <h2 style="margin:0;">Rent-and-Go Katalog</h2>
    </div>
    <div class="user-info">
        <i class="fas fa-user-circle"></i> <span id="userNameDisplay">Sunnatillo Yo'ldoshev</span>
    </div>
</header>

<div class="container">
    <div class="grid" id="productGrid">
        </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="mTitle" style="color: var(--primary);">Mahsulot nomi</h2>
        <div class="modal-body">
            <img id="mImg" src="" class="modal-img">
            <div class="details-info">
                <p id="mDesc" style="color: #666; font-size: 0.9rem;"></p>
                
                <div class="option-group">
                    <label>Rangni tanlang:</label>
                    <select id="mColor">
                        <option value="Qora">Qora</option>
                        <option value="Kumush">Kumush</option>
                        <option value="Ko'k">Ko'k</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>Ijara muddati (kun):</label>
                    <input type="number" id="mDays" value="1" min="1" oninput="calculateTotal()">
                </div>

                <span class="total-price" id="mTotal">0 so'm</span>
                <button class="btn-confirm" onclick="confirmBooking()">Bron qilish</button>
            </div>
        </div>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "Canon EOS R5", price: 450000, desc: "8K Video, 45MP sensor, professional darajadagi kamera.", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500" },
        { id: 2, name: "Sony A7 IV", price: 400000, desc: "33MP Full-frame, real-vaqtda ko'zni kuzatish tizimi.", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?w=500" },
        { id: 3, name: "DJI Mavic 3 Pro", price: 600000, desc: "4/3 CMOS Hasselblad kamera, 43 daqiqa parvoz.", img: "https://images.unsplash.com/photo-1473968512647-3e447244af8f?w=500" },
        { id: 4, name: "MacBook Pro M3 Max", price: 550000, desc: "Grafika va video montaj uchun eng kuchli noutbuk.", img: "https://images.unsplash.com/photo-1517336712461-481bf771df49?w=500" },
        { id: 5, name: "GoPro Hero 12", price: 150000, desc: "5.3K video, HDR va ekstremal barqarorlik.", img: "https://images.unsplash.com/photo-1526170315873-3a921219a730?w=500" },
        { id: 6, name: "Nikon Z9", price: 580000, desc: "Professional sport va tabiat fotosuratchilari uchun.", img: "https://images.unsplash.com/photo-1616423641454-ec9505009035?w=500" }
        // Qolgan 20 tagacha mahsulotni shu tarzda qo'shish mumkin
    ];

    let currentProduct = null;

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <div class="img-box"><img src="${p.img}" alt="${p.name}"></div>
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <span class="price-tag">${p.price.toLocaleString()} so'm / kun</span>
                    <button class="btn-open" onclick="openProduct(${p.id})">Band qilish</button>
                </div>
            </div>
        `).join('');
    }

    function openProduct(id) {
        currentProduct = products.find(p => p.id === id);
        document.getElementById('mTitle').innerText = currentProduct.name;
        document.getElementById('mImg').src = currentProduct.img;
        document.getElementById('mDesc').innerText = currentProduct.desc;
        document.getElementById('mDays').value = 1;
        calculateTotal();
        document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    function calculateTotal() {
        const days = document.getElementById('mDays').value;
        const total = currentProduct.price * days;
        document.getElementById('mTotal').innerText = total.toLocaleString() + " so'm";
    }

    function confirmBooking() {
        const user = document.getElementById('userNameDisplay').innerText;
        const days = document.getElementById('mDays').value;
        const color = document.getElementById('mColor').value;
        const total = currentProduct.price * days;

        const message = `Mijoz: ${user}%0AMahsulot: ${currentProduct.name}%0ARang: ${color}%0AMuddat: ${days} kun%0AUmumiY Narx: ${total.toLocaleString()} so'm`;
        
        window.location.href = `mailto:sunnatilloyoldoshev02@gmail.com?subject=Ijaraga olish so'rovi&body=${message}`;
        closeModal();
    }

    // Ismni localStorage'dan olish (agar bo'lsa)
    const savedName = localStorage.getItem('loggedUser');
    if(savedName) document.getElementById('userNameDisplay').innerText = savedName;

    renderProducts();
</script>

</body>
</html>
