<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-and-Go | Detallar va Katalog</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4e4cfd; --secondary: #f1911e; --bg: #f8f9fc; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: #333; }
        
        /* Navigatsiya */
        header { 
            background: var(--primary); color: white; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .back-btn { color: white; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .user-section { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #ff4757; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* Kategoriyalar */
        .categories { display: flex; justify-content: center; gap: 15px; padding: 25px; background: white; border-bottom: 1px solid #eee; }
        .cat-btn { padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Grid */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        .img-box { width: 100%; height: 180px; background: #f0f0f0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 15px; }
        .card-info h4 { margin: 0 0 10px; font-size: 1.1rem; }
        .price { color: var(--primary); font-weight: bold; display: block; margin-bottom: 15px; }
        .band-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--primary); color: white; cursor: pointer; font-weight: bold; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; padding: 30px; border-radius: 20px; text-align: center; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; }
        .modal-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Orqaga</a>
        <h2 style="margin:0;">Rent-and-Go</h2>
    </div>
    <div class="user-section" id="authSection">
        </div>
</header>

<div class="categories">
    <button class="cat-btn active" onclick="filterItems('Hammasi')">Hammasi</button>
    <button class="cat-btn" onclick="filterItems('Foto')">Foto & Video (10)</button>
    <button class="cat-btn" onclick="filterItems('IT')">IT & Tech (10)</button>
    <button class="cat-btn" onclick="filterItems('Qurilish')">Qurilish (10)</button>
</div>

<div class="container">
    <div class="grid" id="productGrid">
        </div>
</div>

<div id="itemModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" class="modal-img">
        <h2 id="modalTitle"></h2>
        <p id="modalDesc"></p>
        <div style="margin: 15px 0;">
            <label>Kunni tanlang: </label>
            <input type="number" id="days" value="1" min="1" oninput="updateTotal()" style="width: 50px; padding: 5px;">
        </div>
        <h3 id="modalTotal" style="color: var(--secondary);"></h3>
        <button class="band-btn" onclick="finalBook()" style="background: var(--secondary);">Tasdiqlash</button>
    </div>
</div>

<script>
    const items = [
        // Foto & Video
        { name: "Canon EOS R5", price: 450000, cat: "Foto", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" },
        { name: "Sony A7 IV", price: 400000, cat: "Foto", img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?w=400" },
        { name: "DJI Mavic 3 Pro", price: 600000, cat: "Foto", img: "https://images.unsplash.com/photo-1473968512647-3e447244af8f?w=400" },
        { name: "GoPro Hero 12", price: 150000, cat: "Foto", img: "https://images.unsplash.com/photo-1526170315873-3a921219a730?w=400" },
        { name: "Insta360 X3", price: 120000, cat: "Foto", img: "https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=400" },
        // IT & Tech
        { name: "MacBook Pro M3 Max", price: 550000, cat: "IT", img: "https://images.unsplash.com/photo-1517336712461-481bf771df49?w=400" },
        { name: "ASUS ROG Strix G16", price: 350000, cat: "IT", img: "https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=400" },
        { name: "iPad Pro M2", price: 200000, cat: "IT", img: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400" },
        { name: "Sony WH-1000XM5", price: 80000, cat: "IT", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
        // Qurilish
        { name: "Makita HR2470", price: 70000, cat: "Qurilish", img: "https://images.unsplash.com/photo-1504148455328-c376907d081c?w=400" },
        { name: "Bosch Professional", price: 50000, cat: "Qurilish", img: "https://images.unsplash.com/photo-1572981779307-38b8cabb2407?w=400" }
        // Jami 20+ ta mahsulotni shu yerga qo'shish mumkin
    ];

    let selectedItem = null;

    function renderItems(filter = 'Hammasi') {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        const filtered = filter === 'Hammasi' ? items : items.filter(i => i.cat === filter);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <div class="img-box"><img src="${item.img}"></div>
                    <div class="card-info">
                        <h4>${item.name}</h4>
                        <span class="price">${item.price.toLocaleString()} so'm / kun</span>
                        <button class="band-btn" onclick="openModal('${item.name}', ${item.price}, '${item.img}')">Band qilish</button>
                    </div>
                </div>
            `;
        });
    }

    function checkLogin() {
        const authSection = document.getElementById('authSection');
        const user = localStorage.getItem('loggedUser') || "Sunnatillo"; // Default ismingiz
        
        authSection.innerHTML = `
            <span style="font-weight:bold;">Salom, ${user}</span>
            <button class="logout-btn" onclick="logout()">Chiqish</button>
        `;
    }

    function logout() {
        if(confirm("Akkauntdan chiqmoqchimisiz?")) {
            localStorage.removeItem('loggedUser');
            window.location.href = "index.html"; // Chiqishda asosiy sahifaga
        }
    }

    function openModal(name, price, img) {
        selectedItem = { name, price };
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('modalImg').src = img;
        document.getElementById('modalDesc').innerText = "Eng sifatli mahsulotni ijaraga oling.";
        document.getElementById('itemModal').style.display = 'flex';
        updateTotal();
    }

    function closeModal() { document.getElementById('itemModal').style.display = 'none'; }

    function updateTotal() {
        const days = document.getElementById('days').value;
        const total = selectedItem.price * days;
        document.getElementById('modalTotal').innerText = total.toLocaleString() + " so'm";
    }

    function finalBook() {
        const days = document.getElementById('days').value;
        alert(`${selectedItem.name} ${days} kunga muvaffaqiyatli band qilindi!`);
        closeModal();
    }

    function filterItems(cat) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        renderItems(cat);
    }

    // Ishga tushirish
    window.onload = () => {
        checkLogin();
        renderItems();
    };
</script>
</body>
</html>
