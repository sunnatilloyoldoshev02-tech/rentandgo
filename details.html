<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-and-Go | Mahsulotlar Katalogi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4e4cfd; --secondary: #f1911e; --dark: #1a1a2e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f0f2f5; }

        /* HEADER */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .auth-btns button {
            padding: 8px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; margin-left: 10px; transition: 0.3s;
        }
        .login-btn { background: white; color: var(--primary); }
        .reg-btn { background: var(--secondary); color: white; }
        .login-btn:hover { background: #eee; }

        /* FILTER SECTION */
        .filter-section { display: flex; justify-content: center; gap: 10px; padding: 20px; background: white; }
        .filter-btn { padding: 8px 20px; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 30px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--primary); color: white; }

        /* GRID */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { color: var(--primary); font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
        .rent-btn { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 100px auto; padding: 25px; border-radius: 15px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 24px; color: #888; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        
        .google-btn { 
            background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; width: 100%; padding: 10px; border-radius: 8px; margin-top: 15px; font-weight: bold;
        }
        .google-btn img { width: 20px; margin-right: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h2 style="cursor:pointer" onclick="location.href='index.html'">Rent-and-Go</h2></div>
    <div class="auth-btns" id="authBox">
        <button class="login-btn" onclick="openM('loginModal')">Kirish</button>
        <button class="reg-btn" onclick="openM('loginModal')">Ro'yxatdan o'tish</button>
    </div>
</header>

<div class="filter-section">
    <button class="filter-btn active" onclick="render('all')">Hammasi</button>
    <button class="filter-btn" onclick="render('foto')">Foto & Video</button>
    <button class="filter-btn" onclick="render('it')">IT & Tech</button>
    <button class="filter-btn" onclick="render('qurilish')">Qurilish</button>
</div>

<div class="container">
    <div class="product-grid" id="grid"></div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeM('loginModal')">&times;</span>
        <h3 style="text-align:center">Xush kelibsiz!</h3>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Parol">
        <button class="rent-btn" onclick="loginAction('Foydalanuvchi')">Tizimga kirish</button>
        <div class="google-btn" onclick="loginAction('Google User')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg"> Google orqali kirish
        </div>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeM('bookModal')">&times;</span>
        <h3 id="pTitle" style="color:var(--primary); margin-bottom:15px;">Mahsulot nomi</h3>
        
        <label>Rangni tanlang:</label>
        <select id="pColor">
            <option>Qora (Standart)</option>
            <option>Kumushrang</option>
            <option>Oq</option>
        </select>

        <label>To'plam turi:</label>
        <select id="pType">
            <option>Faqat uskuna</option>
            <option>To'liq to'plam (aksessuarlar bilan)</option>
        </select>

        <label>Ijara muddati (kun):</label>
        <input type="number" id="pDays" value="1" min="1">

        <button class="rent-btn" style="background:var(--secondary); margin-top:15px;" onclick="confirmB()">Band qilishni tasdiqlash</button>
    </div>
</div>

<script>
    let isLogged = false;

    // MAHSULOTLAR (Jami 60 ta ma'lumot joyi)
    const data = {
        foto: [
            { name: "Canon EOS R5", price: "450,000", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500" },
            { name: "Sony A7 IV", price: "400,000", img: "https://images.unsplash.com/photo-1510127034890-ba27508e9f1c?w=500" },
            { name: "DJI Mavic 3 Pro", price: "600,000", img: "https://images.unsplash.com/photo-1508614589041-895b88991e3e?w=500" },
            // ... Bu yerda yana 17 ta foto qo'shiladi
        ],
        it: [
            { name: "MacBook Pro M3 Max", price: "550,000", img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500" },
            { name: "ASUS ROG Strix G16", price: "350,000", img: "https://images.unsplash.com/photo-1593642702821-c8da6771f0c6?w=500" },
            // ... Bu yerda yana 18 ta IT mahsulot qo'shiladi
        ],
        qurilish: [
            { name: "Makita HR2470", price: "70,000", img: "https://images.unsplash.com/photo-1504148455328-c376907d081c?w=500" },
            { name: "Bosch Professional", price: "50,000", img: "https://images.unsplash.com/photo-1572981779307-38b8cabb2407?w=500" },
            // ... Bu yerda yana 18 ta uskuna qo'shiladi
        ]
    };

    function render(cat) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        let list = (cat === 'all') ? [...data.foto, ...data.it, ...data.qurilish] : data[cat];
        
        list.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.img}">
                    <div class="card-body">
                        <h4>${item.name}</h4>
                        <p class="price">${item.price} so'm / kun</p>
                        <button class="rent-btn" onclick="startBooking('${item.name}')">Band qilish</button>
                    </div>
                </div>
            `;
        });
    }

    function openM(id) { document.getElementById(id).style.display = 'block'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    function loginAction(user) {
        isLogged = true;
        document.getElementById('authBox').innerHTML = `<span><i class="fas fa-user"></i> Salom, <b>${user}</b></span>`;
        closeM('loginModal');
        alert("Tizimga muvaffaqiyatli kirdingiz!");
    }

    function startBooking(name) {
        if(!isLogged) {
            alert("Iltimos, avval tizimga kiring!");
            openM('loginModal');
        } else {
            document.getElementById('pTitle').innerText = name;
            openM('bookModal');
        }
    }

    function confirmB() {
        const d = document.getElementById('pDays').value;
        const c = document.getElementById('pColor').value;
        alert(`Tasdiqlandi! ${d} kunga ${c} rangli uskuna band qilindi.`);
        closeM('bookModal');
    }

    render('all');
</script>

</body>
</html>
