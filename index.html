<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent-and-Go | Professional Platform</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; color: #fff; overflow-x: hidden; }

        /* Navigatsiya */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: flex-end; gap: 15px; z-index: 2000;
        }
        .auth-btn { padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .login-btn { background: white; color: #0f0c29; }
        .reg-btn { background: #f1911e; color: white; }
        .logout-btn { background: #ff4757; color: white; margin-left: 10px; }

        /* Asosiy Banner */
        header {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070') no-repeat center center/cover;
        }

        h1 { font-size: 4rem; color: #f1911e; letter-spacing: 5px; }
        .btn-group { margin-top: 30px; display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.4s; cursor: pointer; border: none; }
        .btn-primary { background: #f1911e; color: white; }
        .btn-outline { border: 2px solid #fff; color: #fff; background: transparent; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #f1911e; }

        /* Modallar Dizayni */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: #1a1a2e; width: 95%; max-width: 400px; margin: 5% auto; padding: 35px; border-radius: 25px; border: 1px solid #f1911e; position: relative; text-align: center; }
        
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #252545; color: white; outline: none; }
        input:focus { border-color: #f1911e; }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #fff; }
        
        .google-btn { 
            background: white; color: #333; width: 100%; padding: 12px; border-radius: 12px; 
            margin-top: 15px; border: none; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .google-btn img { width: 20px; }
        
        .toggle-link { color: #f1911e; cursor: pointer; font-size: 0.9rem; margin-top: 15px; display: block; }

        /* Bo'limlar */
        section { padding: 100px 20px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border-left: 5px solid #f1911e; }
    </style>
</head>
<body>

    <nav id="navBar">
        </nav>

    <header>
        <div data-aos="zoom-out" data-aos-duration="1500">
            <h1>RENT-AND-GO</h1>
            <p style="font-size: 1.5rem;">Kerakli narsa – kerakli vaqtda</p>
            <div class="btn-group">
                <button onclick="checkInvestor()" class="btn btn-primary">Investor bo'ling</button>
                <a href="details.html" class="btn btn-outline">Batafsil</a>
            </div>
        </div>
    </header>

    <div id="investorModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('investorModal')">&times;</span>
            <h2 style="color:#f1911e">Investorlik So'rovi</h2>
            <form id="investForm">
                <input type="number" id="investAmount" placeholder="Investitsiya miqdori ($)" required>
                <textarea id="additionalNote" placeholder="Maqsadingizni yozing..." required></textarea>
                <button type="button" class="btn btn-primary" style="width:100%" onclick="sendInvestorMail()">So'rovni yuborish</button>
            </form>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('loginModal')">&times;</span>
            <h2 style="color:#f1911e; margin-bottom: 20px;">Tizimga kirish</h2>
            <input type="email" id="loginEmail" placeholder="Emailingizni kiriting" required>
            <input type="password" id="loginPass" placeholder="Parol kiriting" required>
            <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Kirish</button>
            
            <button class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" alt="Google">
                Google orqali kirish
            </button>
            
            <span class="toggle-link" onclick="switchModal('loginModal', 'registerModal')">Hali ro'yxatdan o'tmaganmisiz? Ro'yxatdan o'tish</span>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('registerModal')">&times;</span>
            <h2 style="color:#f1911e; margin-bottom: 20px;">Ro'yxatdan o'tish</h2>
            <input type="text" id="regNick" placeholder="Nik yarating" required>
            <input type="email" id="regEmail" placeholder="Email kiriting" required>
            <input type="password" id="regPass" placeholder="Parol kiriting" required>
            <input type="password" id="regConfirmPass" placeholder="Parolni tasdiqlang" required>
            <button class="btn btn-primary" style="width:100%" onclick="handleAuth('register')">Ro'yxatdan o'tish</button>
            <span class="toggle-link" onclick="switchModal('registerModal', 'loginModal')">Akkauntingiz bormi? Kirish</span>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: false });

        window.onload = updateNav;

        function updateNav() {
            const user = localStorage.getItem('loggedUser');
            const nav = document.getElementById('navBar');
            if (user) {
                nav.innerHTML = `
                    <span style="font-weight:bold; align-self:center;">Salom, ${user}</span>
                    <button class="auth-btn logout-btn" onclick="logout()">Chiqish</button>
                `;
            } else {
                nav.innerHTML = `
                    <button class="auth-btn login-btn" onclick="openModal('loginModal')">Kirish</button>
                    <button class="auth-btn reg-btn" onclick="openModal('registerModal')">Ro'yxatdan o'tish</button>
                `;
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function switchModal(closeId, openId) {
            closeModal(closeId);
            openModal(openId);
        }

        function handleAuth(type) {
            if(type === 'login') {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;
                if(email && pass) {
                    const nick = email.split('@')[0]; // Namuna uchun
                    localStorage.setItem('loggedUser', nick);
                    closeModal('loginModal');
                }
            } else {
                const nick = document.getElementById('regNick').value;
                const pass = document.getElementById('regPass').value;
                const cPass = document.getElementById('regConfirmPass').value;
                if(nick && pass === cPass) {
                    localStorage.setItem('loggedUser', nick);
                    closeModal('registerModal');
                } else {
                    alert("Parollar mos kelmadi!"); return;
                }
            }
            updateNav();
        }

        function logout() {
            localStorage.removeItem('loggedUser');
            updateNav();
        }

        function checkInvestor() {
            if (!localStorage.getItem('loggedUser')) {
                alert("Investor bo'lish uchun avval tizimga kiring!");
                openModal('loginModal');
            } else {
                openModal('investorModal');
            }
        }

        function sendInvestorMail() {
            const user = localStorage.getItem('loggedUser');
            const amount = document.getElementById('investAmount').value;
            const note = document.getElementById('additionalNote').value;

            if(!amount || !note) { alert("Barcha maydonlarni to'ldiring!"); return; }

            const mailTo = "sunnatilloyoldoshev02@gmail.com";
            const subject = "Yangi Investor So'rovi";
            const body = `Yuboruvchi: ${user}%0AMiqdor: $${amount}%0AIzoh: ${note}`;
            
            window.location.href = `mailto:${mailTo}?subject=${subject}&body=${body}`;
            closeModal('investorModal');
        }
    </script>
</body>
</html>
